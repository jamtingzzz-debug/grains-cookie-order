    const cb = ref.on("value", (snap) => {
      const st = snap.val();
      if (!st) return;
      if (st !== prev) { setStatus(st); if (st !== "신규") notify(st); prev = st; }
    });
    return () => ref.off("value", cb);
  }, [orderKey]);

  const submit = async () => {
    // 소리 잠금 해제 (손님 탭 = 사용자 동작)
    try { audioRef.current = audioRef.current || new (window.AudioContext || window.webkitAudioContext)(); audioRef.current.resume(); } catch (e) {}
    let no, key = null;
    try {
      const db = window.__db;
      const res = await db.ref("counter").transaction((c) => (c || 0) + 1);
      no = res.snapshot.val();
      const ref = db.ref("orders").push({
        no, ts: Date.now(), pkg: pkg.t.ko, price: pkg.price,
        items: summary.map((s) => ({ name: s.t.ko, n: s.n })),
        status: "신규",
      });
      key = ref.key;
      await ref;
    } catch (e) {
      no = Math.floor(Math.random() * 900) + 100; // 연결 실패 시에도 손님 화면은 진행
    }
    setOrderNo(no);
    setOrderKey(key);
    setStatus("신규");
    setView("done");
  };
  const reset = () => { setView("select"); setPkg(null); setPicks([]); setOrderNo(null); setOrderKey(null); setStatus("신규"); };

  return (
    <div className="wrap">
      <style>{CSS}</style>

      <header className="hdr">
        <div className="brand">{SHOP_NAME}</div>
        <div className="langRow">
          {LANGS.map(([code, label]) => (
            <button key={code} className={"langBtn" + (lang === code ? " langOn" : "")} onClick={() => setLang(code)}>{label}</button>
          ))}
        </div>
      </header>

      {/* 1) 용기 고르기 */}
      {view === "select" && (
        <main className="body">
          <div className="tagline">{tr.tagline}</div>
          <div className="stepLabel">{tr.step1}</div>
          <div className="pkgList">
            {PACKAGES.map((p) => (
              <button key={p.id} className="pkgCard" onClick={() => choosePkg(p)}>
                <span className="pkgEmoji"><Thumb base={p.img} emoji={p.emoji} imgClass="pkgImg" emojiClass="pkgEmojiTxt" /></span>
                <span className="pkgInfo">
                  <span className="pkgName">{L(p.t, lang)}</span>
                  <span className="pkgCap">{tr.pickN(p.cap)}</span>
                </span>
                <span className="pkgPrice">{won(p.price)}</span>
              </button>
            ))}
          </div>
          <div className="footnote">{tr.footnote}</div>
        </main>
      )}

      {/* 2) 쿠키 담기 */}
      {view === "build" && pkg && (
        <main className="body">
          <Stage pkg={pkg} picks={picks} cap={cap} lang={lang} tr={tr} onRemove={removeOne} onChange={() => setView("select")} />

          {summary.length > 0 && (
            <div className="picked">
              {summary.map((s) => (
                <button key={s.id} className="pickTag" onClick={() => removeOne(s.id)}>
                  {s.emoji} {L(s.t, lang)}{s.n > 1 ? ` ×${s.n}` : ""} <em>✕</em>
                </button>
              ))}
            </div>
          )}

          <div className="tinHelp">
            {full ? "" : tr.remain(cap - picks.length) + " · " + tr.hintDup}
            {!full && cap >= 15 && <button className="randBtn" onClick={fillRandom}>{tr.randomFill}</button>}
          </div>

          <input className="search" placeholder={tr.search} value={query} onChange={(e) => setQuery(e.target.value)} />
          <div className="chips">
            {CAT_KEYS.map((c) => (
              <button key={c} className={"chip" + (c === cat ? " chipOn" : "")} onClick={() => setCat(c)}>{L(CAT_T[c], lang)}</button>
            ))}
          </div>

          <div className="grid">
            {filtered.map((o) => {
              const n = countOf(o.id);
              return (
                <div key={o.id} className={"opt" + (n > 0 ? " optOn" : "")}>
                  <div className="optThumbWrap"><Thumb base={o.img} emoji={o.emoji} imgClass="optImg" emojiClass="optEmoji" /></div>
                  <div className="optName">{L(o.t, lang)}</div>
                  {n === 0 ? (
                    <button className="optAdd" disabled={full} onClick={() => addOne(o.id)}>{full ? tr.full : tr.add}</button>
                  ) : (
                    <div className="optStep">
                      <button onClick={() => removeOne(o.id)}>－</button>
                      <span>{n}</span>
                      <button disabled={full} onClick={() => addOne(o.id)}>＋</button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div className="footnote">{tr.footnote}</div>
        </main>
      )}

      {/* 3) 주문 확인 */}
      {view === "review" && pkg && (
        <Sheet title={tr.review} onClose={() => setView("build")}>
          <div className="recap">
            <div className="recapTop"><strong>{L(pkg.t, lang)} · {tr.perCap(cap)}</strong><span>{won(pkg.price)}</span></div>
            <div className="recapItems">
              {summary.map((s) => (
                <span key={s.id} className="recapTag">{s.emoji} {L(s.t, lang)}{s.n > 1 ? ` ×${s.n}` : ""}</span>
              ))}
            </div>
          </div>
          <div className="note">{tr.payNote}</div>
          <button className="cta" onClick={submit}>{tr.confirm} · {won(pkg.price)}</button>
        </Sheet>
      )}

      {/* 4) 완료 — 주문번호 */}
      {view === "done" && orderNo && (
        <Sheet title={tr.doneTitle} hideClose={status !== "준비완료"} onClose={status === "준비완료" ? reset : () => {}}>
          <div className={"statusBig s-" + status}>
            <div className="bigNoLabel">{tr.orderNo}</div>
            <div className="bigNo">{orderNo}</div>
          </div>
          <div className="tracker">
            {STEPS.map((st, i) => {
              const idx = STEPS.indexOf(status);
              const active = idx >= i;
              const current = status === st;
              return (
                <div key={st} className={"tstep" + (active ? " on" : "") + (current ? " cur" : "")}>
                  <div className="tdot">{active ? "✓" : i + 1}</div>
                  <div className="tlabel">{L(STEP_LABEL[st], lang)}</div>
                </div>
              );
            })}
          </div>
          <p className={"doneMsg" + (status === "준비완료" ? " ready" : "")}>{L(STATUS_MSG[status], lang)}</p>
          {status === "준비완료"
            ? <button className="cta" onClick={reset}>{tr.newOrder}</button>
            : <div className="hint">{L(KEEP_OPEN, lang)}</div>}
        </Sheet>
      )}

      {view === "build" && (
        <button className={"bottomBar" + (full ? "" : " barOff")} disabled={!full} onClick={() => setView("review")}>
          {full ? `${tr.order} · ${won(pkg.price)}` : `${picks.length} / ${cap}`}
        </button>
      )}
    </div>
  );
}

function Stage({ pkg, picks, cap, lang, tr, onRemove, onChange }) {
  return (
    <div className="stage">
      {pkg.viz === "ring" && <RingTin picks={picks} cap={cap} tr={tr} onRemove={onRemove} />}
      {pkg.viz === "grid" && <GridTin picks={picks} cap={cap} tr={tr} onRemove={onRemove} />}
      {pkg.viz === "gauge" && <Gauge picks={picks} cap={cap} />}
      <div className="stageMeta">
        <div className="gName">{L(pkg.t, lang)}</div>
        <div className="gPrice">{won(pkg.price)} · {tr.perCap(cap)}</div>
        <button className="gChange" onClick={onChange}>{tr.change}</button>
      </div>
    </div>
  );
}

function RingTin({ picks, cap, tr, onRemove }) {
  const slotPos = (i) => {
    const angle = (-90 + i * (360 / cap)) * (Math.PI / 180);
    const R = 78, Cc = 110, S = 54;
    return { left: Cc + R * Math.cos(angle) - S / 2, top: Cc + R * Math.sin(angle) - S / 2 };
  };
  return (
    <div className="tin round">
      <div className="tinCenter">
        <div className="tinCount">{picks.length}<span>/{cap}</span></div>
        <div className="tinLabel">{picks.length >= cap ? tr.filled : tr.choosing}</div>
      </div>
      {Array.from({ length: cap }).map((_, i) => {
        const id = picks[i]; const item = id ? byId(id) : null; const pos = slotPos(i);
        return (
          <div key={i} className={"slot" + (item ? " slotFull" : "")} style={{ left: pos.left, top: pos.top }}
            onClick={() => item && onRemove(id)}>{item ? <Thumb base={item.img} emoji={item.emoji} imgClass="slotImg" emojiClass="slotEmoji" /> : ""}</div>
        );
      })}
    </div>
  );
}

function GridTin({ picks, cap, tr, onRemove }) {
  return (
    <div className="tinGridWrap">
      <div className="tin square" style={{ gridTemplateColumns: "repeat(3, 1fr)" }}>
        {Array.from({ length: cap }).map((_, i) => {
          const id = picks[i]; const item = id ? byId(id) : null;
          return (
            <div key={i} className={"gslot" + (item ? " slotFull" : "")} onClick={() => item && onRemove(id)}>{item ? <Thumb base={item.img} emoji={item.emoji} imgClass="slotImg" emojiClass="slotEmoji" /> : ""}</div>
          );
        })}
      </div>
      <div className="squareCount">{picks.length} / {cap} {picks.length >= cap ? "· " + tr.filled : ""}</div>
    </div>
  );
}

function Gauge({ picks, cap }) {
  const R = 34, C = 2 * Math.PI * R;
  const frac = cap ? picks.length / cap : 0;
  return (
    <svg width="84" height="84" viewBox="0 0 84 84" className="gauge">
      <circle cx="42" cy="42" r={R} className="gTrack" />
      <circle cx="42" cy="42" r={R} className="gFill" strokeDasharray={C} strokeDashoffset={C * (1 - frac)} transform="rotate(-90 42 42)" />
      <text x="42" y="38" className="gNum">{picks.length}</text>
      <text x="42" y="54" className="gCap">/ {cap}</text>
    </svg>
  );
}

function Thumb({ base, emoji, imgClass, emojiClass }) {
  const exts = [".jpg.png", ".png", ".jpg", ".jpeg", ".JPG", ".PNG", ".jpg.jpg", ".png.png"];
  const [i, setI] = useState(0);
  if (!base || i >= exts.length) return <span className={emojiClass}>{emoji}</span>;
  return <img className={imgClass} src={base + exts[i]} alt="" loading="lazy" onError={() => setI(i + 1)} />;
}

function Sheet({ children, onClose, title, hideClose }) {
  return (
    <div className="sheetOverlay" onClick={onClose}>
      <div className="sheet" onClick={(e) => e.stopPropagation()}>
        <div className="sheetGrip" />
        {title && <div className="sheetTitle">{title}</div>}
        {!hideClose && <button className="sheetClose" onClick={onClose} aria-label="close">✕</button>}
        {children}
      </div>
    </div>
  );
}
