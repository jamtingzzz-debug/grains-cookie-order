<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#7A4A52" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>그래인스 쿠키 · 주문 현황판</title>
<style>
  html, body { margin: 0; padding: 0; background: #EFE9DD; }
  #root { min-height: 100vh; }
  #boot { display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:-apple-system,system-ui,sans-serif; color:#8A7F75; font-size:15px; }
  #err { display:none; padding:20px; margin:16px; background:#FBEEE9; border:1px solid #E0B4A8; border-radius:12px; color:#9A3A2B; font-family:-apple-system,system-ui,monospace; font-size:13px; white-space:pre-wrap; word-break:break-word; line-height:1.5; }
</style>
<script>
  function showErr(msg) {
    var e = document.getElementById("err"); if (!e) return;
    e.style.display = "block";
    e.textContent = "문제가 발생했어요. 아래 내용을 캡처해서 보여주세요:\n\n" + msg;
    var b = document.getElementById("boot"); if (b) b.style.display = "none";
  }
  window.addEventListener("error", function (ev) { showErr((ev.message || "오류") + (ev.filename ? "\n" + ev.filename + ":" + ev.lineno : "")); });
  window.addEventListener("unhandledrejection", function (ev) { showErr("Promise 오류: " + (ev.reason && ev.reason.message ? ev.reason.message : ev.reason)); });
</script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script>
  var firebaseConfig = {
    apiKey: "AIzaSyBZlyyD7T5FI6sGF0vSmuM4QmtoG77KNvs",
    authDomain: "grains-cookies-order.firebaseapp.com",
    databaseURL: "https://grains-cookies-order-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "grains-cookies-order",
    storageBucket: "grains-cookies-order.firebasestorage.app",
    messagingSenderId: "613602106224",
    appId: "1:613602106224:web:c1842cad52458e67bf4db5"
  };
  try { firebase.initializeApp(firebaseConfig); window.__db = firebase.database(); }
  catch (e) { console.error("Firebase init 실패:", e); }
</script>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root"><div id="boot">불러오는 중…</div></div>
<div id="err"></div>
<script type="text/babel" data-presets="env,react">
try {
const { useState, useMemo, useRef, useEffect } = React;

const SHOP = "그래인스 쿠키";

// 패키지 (테스트 주문 생성용)
const PKGS = [
  { name: "종이봉투", cap: 15, price: 9000 },
  { name: "원형 틴", cap: 6, price: 17000 },
  { name: "사각 틴", cap: 9, price: 23000 },
];
const COOKIES = [
  "초코칩청크쿠키", "곰돌이초코쿠키", "녹차랑그드샤", "딸기타르트쿠키", "제주감귤쿠키",
  "피넛버터쿠키", "크림치즈쿠키", "검은깨쿠키", "코코넛아몬드쿠키", "한라부쿠키",
];

const STATUS_NEXT = { 신규: "계산완료", 계산완료: "준비완료", 준비완료: null };
const NEXT_LABEL = { 신규: "계산 완료", 계산완료: "준비 완료" };

const fmtTime = (ts) => {
  const d = new Date(ts || Date.now());
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
};
const won = (n) => (n || 0).toLocaleString("ko-KR") + "원";

function randomOrder(no) {
  const pk = PKGS[Math.floor(Math.random() * PKGS.length)];
  const picks = {};
  for (let i = 0; i < pk.cap; i++) {
    const c = COOKIES[Math.floor(Math.random() * COOKIES.length)];
    picks[c] = (picks[c] || 0) + 1;
  }
  return {
    no, ts: Date.now(), pkg: pk.name, price: pk.price,
    memo: Math.random() > 0.7 ? "견과류 알레르기 있어요" : "",
    items: Object.entries(picks).map(([name, n]) => ({ name, n })),
    status: "신규",
  };
}

function App() {
  const [orders, setOrders] = useState([]);
  const [filter, setFilter] = useState("진행중");
  const [ready, setReady] = useState(false);
  const seen = useRef(new Set());
  const firstLoad = useRef(true);

  const beep = () => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; o.type = "sine";
      g.gain.setValueAtTime(0.001, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      o.start(); o.stop(ctx.currentTime + 0.42);
    } catch (e) {}
  };

  useEffect(() => {
    const db = window.__db;
    if (!db) return;
    const ref = db.ref("orders");
    const cb = ref.on("value", (snap) => {
      const val = snap.val() || {};
      const list = Object.entries(val).map(([key, o]) => ({ key, ...o }));
      list.sort((a, b) => (b.ts || 0) - (a.ts || 0));
      let isNew = false;
      list.forEach((o) => {
        if (!seen.current.has(o.key)) { if (!firstLoad.current) isNew = true; seen.current.add(o.key); }
      });
      setOrders(list);
      setReady(true);
      if (isNew) beep();
      firstLoad.current = false;
    });
    return () => ref.off("value", cb);
  }, []);

  const addTest = async () => {
    try {
      const res = await window.__db.ref("counter").transaction((c) => (c || 0) + 1);
      await window.__db.ref("orders").push(randomOrder(res.snapshot.val()));
    } catch (e) {}
  };
  const advance = (key, status) => { window.__db.ref("orders/" + key + "/status").set(STATUS_NEXT[status]); };
  const clear = (key) => { window.__db.ref("orders/" + key).remove(); };
  const cancelOrder = (key) => { if (window.confirm("이 주문을 취소할까요? 손님 화면에 취소 알림이 갑니다.")) clear(key); };

  const counts = useMemo(() => {
    const c = { 진행중: 0, 신규: 0, 계산완료: 0, 준비완료: 0 };
    orders.forEach((o) => { c[o.status] = (c[o.status] || 0) + 1; if (o.status !== "준비완료") c.진행중 += 1; });
    return c;
  }, [orders]);

  const shown =
    filter === "진행중" ? orders.filter((o) => o.status !== "준비완료") :
    orders.filter((o) => o.status === filter);

  return (
    <div className="wrap">
      <style>{CSS}</style>

      <header className="hdr">
        <div>
          <div className="brand">{SHOP}</div>
          <div className="sub">주문 현황판 · 직원용</div>
        </div>
        <div className={"newpill" + (counts.신규 > 0 ? " on" : "")}>신규 {counts.신규}</div>
      </header>

      <div className="tabs">
        {[["진행중", counts.진행중], ["신규", counts.신규], ["계산완료", counts.계산완료], ["준비완료", counts.준비완료]].map(([t, c]) => (
          <button key={t} className={"tab" + (filter === t ? " tabOn" : "")} onClick={() => setFilter(t)}>
            {t}<span>{c}</span>
          </button>
        ))}
      </div>

      <main className="list">
        {!ready ? (
          <div className="empty">현황판을 불러오는 중…</div>
        ) : shown.length === 0 ? (
          <div className="empty">표시할 주문이 없어요.</div>
        ) : (
          shown.map((o) => (
            <div key={o.key} className={"order s-" + o.status}>
              <div className="oTop">
                <div className="oNoWrap">
                  <span className="oNoLabel">주문번호</span>
                  <span className="oNo">{o.no}</span>
                </div>
                <div className="oMeta">
                  <span className={"chip c-" + o.status}>{o.status}</span>
                  <span className="oTime">{fmtTime(o.ts)}</span>
                </div>
              </div>

              <div className="oPkg">{o.pkg} · {won(o.price)}</div>

              <div className="oItems">
                {(o.items || []).map((x, i) => (
                  <span key={i} className="iTag">{x.name}{x.n > 1 ? ` ×${x.n}` : ""}</span>
                ))}
              </div>

              {o.memo && <div className="oMemo">⚠️ {o.memo}</div>}

              <div className="oFoot">
                {STATUS_NEXT[o.status] ? (
                  <>
                    <button className="adv" onClick={() => advance(o.key, o.status)}>{NEXT_LABEL[o.status]}</button>
                    <button className="cancelBtn" onClick={() => cancelOrder(o.key)}>주문 취소</button>
                  </>
                ) : (
                  <button className="clearBtn" onClick={() => clear(o.key)}>수령 완료 · 지우기</button>
                )}
              </div>
            </div>
          ))
        )}
      </main>

      <button className="testBtn" onClick={addTest}>＋ 테스트 주문 (작동 확인용)</button>
      <div className="foot">손님이 QR로 주문하면 이 화면에 자동으로 떠요.</div>
    </div>
  );
}

const CSS = `
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
.wrap {
  --bg:#F7F2E9; --surface:#FFFFFF; --ink:#2B2320; --soft:#8A7F75;
  --primary:#7A4A52; --accent:#C2A24E; --line:#EAE2D4;
  --new:#B4493A; --prep:#C2872E; --done:#7E9A6E;
  max-width: 440px; margin: 0 auto; min-height: 100vh; background: var(--bg); color: var(--ink);
  padding-bottom: 96px; font-family:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
}
.hdr { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; background: var(--bg); border-bottom: 1px solid var(--line); }
.brand { font-size: 21px; font-weight: 800; letter-spacing: -0.02em; }
.sub { font-size: 12px; color: var(--soft); margin-top: 2px; }
.newpill { font-size: 13px; font-weight: 800; color: var(--soft); background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 8px 14px; }
.newpill.on { color: #fff; background: var(--new); border-color: var(--new); animation: pulse 1.6s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(180,73,58,0.4) } 50% { box-shadow: 0 0 0 7px rgba(180,73,58,0) } }
.tabs { display: flex; gap: 7px; padding: 14px 16px 6px; position: sticky; top: 64px; background: var(--bg); z-index: 9; }
.tab { flex: 1; padding: 9px 4px; border: 1px solid var(--line); background: var(--surface); border-radius: 12px; font-size: 12.5px; font-weight: 700; color: var(--soft); cursor: pointer; font-family: inherit; }
.tab span { display: inline-block; margin-left: 4px; font-size: 12px; opacity: 0.7; }
.tabOn { background: var(--primary); color: #fff; border-color: var(--primary); }
.list { padding: 10px 16px 20px; display: flex; flex-direction: column; gap: 12px; }
.empty { text-align: center; color: var(--soft); padding: 48px; font-size: 14px; }
.order { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 14px 15px; }
.order.s-신규 { border-left: 5px solid var(--new); }
.order.s-계산완료 { border-left: 5px solid var(--prep); }
.order.s-준비완료 { border-left: 5px solid var(--done); opacity: 0.85; }
.oTop { display: flex; justify-content: space-between; align-items: center; }
.oNoWrap { display: flex; align-items: baseline; gap: 7px; }
.oNoLabel { font-size: 12px; color: var(--soft); font-weight: 700; }
.oNo { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
.oMeta { display: flex; align-items: center; gap: 8px; }
.oTime { font-size: 12px; color: var(--soft); }
.chip { font-size: 11.5px; font-weight: 800; padding: 4px 9px; border-radius: 999px; color: #fff; }
.c-신규 { background: var(--new); }
.c-계산완료 { background: var(--prep); }
.c-준비완료 { background: var(--done); }
.oPkg { font-size: 13px; font-weight: 700; color: var(--primary); margin: 8px 0 4px; }
.oItems { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
.iTag { font-size: 12.5px; background: #F3ECDF; border-radius: 8px; padding: 5px 9px; font-weight: 600; }
.oMemo { margin: 8px 0; padding: 9px 11px; background: #FBEEE9; border-radius: 10px; font-size: 13px; font-weight: 600; color: #9A3A2B; }
.oFoot { margin-top: 10px; display:flex; flex-direction:column; gap:7px; }
.cancelBtn { width:100%; border:1px solid #E6CFC9; background:#FBF1EF; color:#9A3A2B; font-size:12.5px; font-weight:700; padding:9px; border-radius:10px; cursor:pointer; font-family:inherit; }
.adv { width: 100%; border: none; background: var(--primary); color: #fff; font-size: 14px; font-weight: 800; padding: 13px; border-radius: 12px; cursor: pointer; font-family: inherit; }
.clearBtn { width: 100%; border: 1px solid var(--line); background: var(--bg); color: var(--soft); font-size: 13.5px; font-weight: 700; padding: 12px; border-radius: 12px; cursor: pointer; font-family: inherit; }
.testBtn { position: fixed; left: 50%; transform: translateX(-50%); bottom: 40px; width: min(408px, calc(100% - 32px)); z-index: 30; padding: 15px; background: var(--ink); color: #fff; border: none; border-radius: 14px; font-size: 14.5px; font-weight: 700; cursor: pointer; font-family: inherit; box-shadow: 0 8px 22px rgba(0,0,0,0.2); }
.foot { position: fixed; left: 0; right: 0; bottom: 14px; text-align: center; font-size: 11.5px; color: var(--soft); }
`;


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
} catch (e) { showErr(e && e.stack ? e.stack : String(e)); }
</script>
</body>
</html>
